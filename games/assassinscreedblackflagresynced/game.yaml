gdl: 1
version: 0.0.1   # extension version — drives info.json, the release tag, and the zip name

# Assassin's Creed Black Flag Resynced (Ubisoft Singapore / Ubisoft) — a full remake
# of AC IV: Black Flag built on the latest Ubisoft Anvil engine (same modding
# generation as AC Shadows / AC Mirage). NOT Unreal — mods are .forge archives, not
# paks. The original AC4 (assassinscreedivblackflag) used the old .forge toolchain;
# this remake uses the modern Anvil .forge layout.
#
# UNRELEASED at scaffold time (launches 2026-07-09). Almost everything game-specific is
# UNVERIFIED and must be confirmed against a real install before release:
#   - The Nexus game domain does not exist yet (api.nexusmods.com 404s for it). The id
#     below ("assassinscreedblackflagresynced") is the agreed domain; corpus fetch will
#     find no mods until the Nexus page is live.
#   - The root executable name is a best-guess (AC Shadows ships ACShadows.exe in the
#     install root; AC Mirage ships ACMirage.exe).
#   - The install/mod layout follows AC Shadows conventions: the moddable archive is
#     DataPC_boot_patch_01.forge in the GAME ROOT (next to the exe); .forge mods replace
#     it (only one active at a time). Confirm the real moddable .forge filename(s) and
#     any DLC subfolder routing once the game ships.
#
# DRM note: all PC versions require Ubisoft Connect (+ Denuvo). The Ubisoft Connect
# numeric appId, the Epic manifest AppName, and the Xbox package Identity Name are not
# published yet, so only the confirmed Steam id is wired up — add the others when known.

game:
  id: assassinscreedblackflagresynced
  name: Assassin's Creed Black Flag Resynced
  executable: ACBlackFlagResynced.exe       # UNVERIFIED — Anvil root launcher; confirm at release
  requiredFiles: [ACBlackFlagResynced.exe]  # UNVERIFIED — keep in sync with executable
  logo: gameart.webp
  author: Nexus Mods
  nexusDomain: assassinscreedblackflagresynced
  details:
    steamAppId: 3751950
    supportsSymlinks: true

stores:
  steam: "3751950"
  # Epic ("assassins-creed-black-flag-resynced") and Xbox are confirmed platforms but
  # their store ids (Epic manifest AppName, Xbox package Identity Name) aren't published
  # pre-launch. Ubisoft Connect is required on every PC version but its numeric appId is
  # likewise unpublished. Add stores once each id is confirmed — never guess.

context:
  # .forge mods replace the moddable archive that lives directly in the install root.
  forgeRootPath:      ${installPath}
  # AnvilToolkit / Forger Patch Manager loose-asset bundles (forward-compat — these
  # tools weren't yet compatible with AC Shadows at scaffold time; same expected here).
  forgerPatchesPath:  ${installPath}/ForgerPatches

modTypes:
  - { id: acbfr-forge,  name: ".forge archive (game root)",        path: "${forgeRootPath}" }
  - { id: acbfr-forger, name: "ForgerPatches (AnvilToolkit mods)", path: "${installPath}" }
  - { id: acbfr-root,   name: "Root (game folder)",                path: "${installPath}" }

installers:
  # --- Priority 20: ForgerPatches bundle (game-relative ForgerPatches/ tree) ---
  # An archive already laid out as ForgerPatches/AnvilToolkitMods/<Mod>/... deploys
  # intact from the install root. Placed before the bare-.forge rule so a Forger
  # bundle that also carries a .forge isn't flattened to root.
  - id: forger-patches
    priority: 20
    when: { hasFile: "**/ForgerPatches/**" }
    anchor: "**/*"
    take: archive-root
    placeAt: "${installPath}"
    modType: acbfr-forger

  # --- Priority 30: .forge archive replacement → game root ---
  # The dominant mod shape: a single .forge (usually DataPC_boot_patch_01.forge),
  # sometimes wrapped in a folder with a readme. Strip the wrapper and place the
  # .forge (and any siblings) directly in the install root. Note only one .forge is
  # active at a time, so two such mods conflict on filename — Vortex resolves that.
  - id: forge
    priority: 30
    when: { hasFile: "**/*.forge" }
    unless: { hasFile: "**/ForgerPatches/**" }
    anchor: "**/*.forge"
    take: parent
    placeAt: "${forgeRootPath}"
    modType: acbfr-forge

  # --- Priority 90: catch-all overlay → install root (game-relative archives) ---
  # Anything not a .forge or ForgerPatches bundle deploys as-is from the install root
  # (e.g. a tool, a loose-file mod laid out game-relative). Lowest priority.
  - id: root
    priority: 90
    when: { hasFile: "**/*" }
    unless:
      any:
        - { hasFile: "**/*.forge" }
        - { hasFile: "**/ForgerPatches/**" }
    anchor: "**/*"
    take: archive-root
    placeAt: "${installPath}"
    modType: acbfr-root

toolbarActions:
  - id: open-nexus-page
    title: Open Nexus Page
    priority: 200
    target: { openUrl: "https://www.nexusmods.com/assassinscreedblackflagresynced" }

# nexus: block omitted — the game's Nexus domain doesn't exist yet and the upload
# file-group id is unknown. The Vortex extension page is nexusmods.com/site/mods/1977
# (modId 1977). At release, add:
#   nexus:
#     modId: 1977
#     fileGroupId: <from the Nexus upload page>
#     displayName: Assassin's Creed Black Flag Resynced Support for Vortex

# Corpus validators: assertions checked against real Nexus archives via
# `gdl test:corpus --fetch`. The domain has no published mods yet, so corpus is empty
# until the Nexus page goes live; the tests.cases below are the real regression guard.
validators:
  - id: forge-to-root
    name: ".forge archives (no ForgerPatches wrapper) install to the game root"
    when:
      all:
        - { hasFile: "**/*.forge" }
        - not: { hasFile: "**/ForgerPatches/**" }
    assert:
      matched: forge
      modType: acbfr-forge

  - id: forger-bundle-to-root
    name: "ForgerPatches bundles deploy game-relative from the install root"
    when: { hasFile: "**/ForgerPatches/**" }
    assert:
      matched: forger-patches
      modType: acbfr-forger

tests:
  corpus: nexus
  cases:
    # --- Bare .forge at archive root → game root ---
    - name: "forge: bare DataPC_boot_patch_01.forge → install root"
      archive:
        - DataPC_boot_patch_01.forge
      expect:
        matched: forge
        modType: acbfr-forge
        plan:
          - ${forgeRootPath}/DataPC_boot_patch_01.forge

    # --- .forge wrapped in a folder with a readme → strip wrapper, place at root ---
    - name: "forge: wrapped .forge + readme stripped to install root"
      archive:
        - CoolReshade/DataPC_boot_patch_01.forge
        - CoolReshade/README.txt
      expect:
        matched: forge
        modType: acbfr-forge
        plan:
          - ${forgeRootPath}/DataPC_boot_patch_01.forge
          - ${forgeRootPath}/README.txt

    # --- ForgerPatches / AnvilToolkit loose-asset bundle → deploy intact from root ---
    - name: "forger-patches: AnvilToolkit bundle deploys game-relative"
      archive:
        - ForgerPatches/AnvilToolkitMods/MyTexMod/texture_diffuse.dds
        - ForgerPatches/AnvilToolkitMods/MyTexMod/mod.forger2
      expect:
        matched: forger-patches
        modType: acbfr-forger
        plan:
          - ${installPath}/ForgerPatches/AnvilToolkitMods/MyTexMod/texture_diffuse.dds
          - ${installPath}/ForgerPatches/AnvilToolkitMods/MyTexMod/mod.forger2

    # --- Catch-all overlay: a game-relative tool/loose-file archive → install root ---
    - name: "root: non-forge archive overlays the install root"
      archive:
        - SomeTool/tool.exe
        - SomeTool/config.ini
      expect:
        matched: root
        modType: acbfr-root
        plan:
          - ${installPath}/SomeTool/tool.exe
          - ${installPath}/SomeTool/config.ini
