gdl: 1
version: 1.0.2

game:
  id: moonlightpeaks
  name: Moonlight Peaks
  executable: Moonlight Peaks.exe
  requiredFiles: ["Moonlight Peaks.exe"]
  logo: gameart.webp
  author: Nexus Mods
  nexusDomain: moonlightpeaks
  details:
    supportsSymlinks: true

stores:
  steam: "2209900"

context:
  pluginsPath: "${installPath}/BepInEx/plugins"

modTypes:
  - { id: moonlightpeaks-root, name: "Root (game folder)", path: "${installPath}" }
  - { id: moonlightpeaks-bepinex, name: "BepInEx (game folder)", path: "${installPath}" }

installers:
  - id: bepinex
    priority: 10
    when: { hasFile: "**/BepInEx/**" }
    anchor: "**/BepInEx/"
    take: self
    placeAt: "${installPath}"
    modType: moonlightpeaks-bepinex

  - id: root
    priority: 20
    when: { hasFile: "**/*" }
    anchor: "**/*"
    take: archive-root
    placeAt: "${installPath}"
    modType: moonlightpeaks-root

setup:
  ensureDirs:
    - ${pluginsPath}

toolbarActions:
  - { id: open-nexus-page, title: Open Nexus Page, priority: 200, target: { openUrl: "https://www.nexusmods.com/moonlightpeaks" } }

nexus:
  modId: 2027
  fileGroupId: 7625237
  displayName: Moonlight Peaks Support for Vortex

validators:
  - id: bepinex-validator
    name: Archives containing a BepInEx/ folder deploy to the game install root
    when: { hasFile: "**/BepInEx/**" }
    assert:
      matched: bepinex
      modType: moonlightpeaks-bepinex

tests:
  corpus: nexus
  cases:
    - name: "root: flat files deploy to game root"
      archive:
        - mod.dll
        - readme.txt
      expect:
        matched: root
        modType: moonlightpeaks-root
        plan:
          - ${installPath}/mod.dll
          - ${installPath}/readme.txt

    - name: "root: subfolder structure is preserved at game root"
      archive:
        - CustomLoader/plugin.dll
      expect:
        matched: root
        modType: moonlightpeaks-root
        plan:
          - ${installPath}/CustomLoader/plugin.dll

    - name: "bepinex: BepInEx/plugins at archive root"
      archive:
        - BepInEx/plugins/mod.dll
      expect:
        matched: bepinex
        modType: moonlightpeaks-bepinex
        plan:
          - ${installPath}/BepInEx/plugins/mod.dll
