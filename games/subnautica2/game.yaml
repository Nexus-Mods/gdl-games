gdl: 1
version: 1.2.0

game:
  id: subnautica2
  name: Subnautica 2
  executable: Subnautica2.exe
  requiredFiles: [Subnautica2.exe]
  logo: gameart.webp
  nexusDomain: subnautica2
  details:
    steamAppId: 1962700
    epicAppId: "22bfc34d90b64054809542014fc9eb32"
    supportsSymlinks: true
    gameProjectFolder: Subnautica2
    ignoreConflicts: [enabled.txt, mods.txt, UE4SS-settings.ini]
    ignoreDeploy: [mods.txt]

stores:
  steam: "1962700"
  epic: "22bfc34d90b64054809542014fc9eb32"

context:
  arch:
    storeBranch:
      xbox: WinGDK
      default: Win64

  gamePath:
    storeBranch:
      xbox: ${installPath}
      default: ${installPath}/Subnautica2

  pakModsPath: ${gamePath}/Content/Paks/~mods
  logicModsPath: ${gamePath}/Content/Paks/LogicMods
  paksPath: ${gamePath}/Content/Paks

  ue4ssInjectorPath: ${gamePath}/Binaries/${arch}
  ue4ssRootPath: ${gamePath}/Binaries/${arch}/ue4ss
  ue4ssModsPath: ${gamePath}/Binaries/${arch}/ue4ss/Mods

modTypes:
  # Deploy roots. A modType's `path` is the runtime deploy root for files of that
  # type; each installer's `placeAt` MUST resolve to the same path (enforced by
  # GDL114). Asset paks and blueprint (LogicMods) paks both deploy under
  # Content/Paks — blueprint mods just carry their LogicMods/ subfolder in the
  # stripped relative path, so both modTypes share the ${paksPath} root.
  - { id: subnautica2-pak,            name: "Paks (Content/Paks)",        path: "${paksPath}" }
  - { id: subnautica2-logicmods,      name: "LogicMods (Blueprint paks)", path: "${paksPath}" }
  - { id: subnautica2-ue4ss,          name: "UE4SS (Lua scripts)",      path: "${ue4ssModsPath}" }
  - { id: subnautica2-ue4ss-injector, name: "UE4SS Injector",           path: "${ue4ssInjectorPath}" }
  - { id: subnautica2-root,           name: "Root (game folder)",       path: "${installPath}" }
  - { id: subnautica2-contentfolder,  name: "Content folder",           path: "${gamePath}" }

installers:
  # --- Priority 15: UE4SS Injector (dwmapi.dll, xinput1_4.dll, UE4SS-settings.ini) ---
  - id: ue4ss-injector
    priority: 15
    when: { hasFile: "**/{dwmapi.dll,xinput1_4.dll,UE4SS-settings.ini}" }
    anchor: "**/{dwmapi.dll,xinput1_4.dll,UE4SS-settings.ini}"
    take: parent
    placeAt: "${ue4ssInjectorPath}"
    modType: subnautica2-ue4ss-injector

  # --- Priority 20: LogicMods (Blueprint paks under LogicMods/) ---
  - id: logicmods
    priority: 20
    when: { hasFile: "**/LogicMods/**" }
    anchor: "**/LogicMods/"
    take: self
    placeAt: "${paksPath}"
    modType: subnautica2-logicmods

  # --- Priority 22: UE4SS Lua (Scripts/*.lua present) ---
  - id: ue4ss-lua
    priority: 22
    when: { hasFile: "**/Scripts/*.lua" }
    unless: { hasFile: "**/{dwmapi.dll,xinput1_4.dll,UE4SS-settings.ini}" }
    anchor: "**/Scripts/*.lua"
    take: parent.parent
    placeAt: "${ue4ssModsPath}"
    modType: subnautica2-ue4ss

  # --- Priority 23: UE4SS Lua (enabled.txt only, no Scripts/*.lua) ---
  - id: ue4ss-lua-enabled
    priority: 23
    when: { hasFile: "**/enabled.txt" }
    unless:
      any:
        - { hasFile: "**/Scripts/*.lua" }
        - { hasFile: "**/{dwmapi.dll,xinput1_4.dll,UE4SS-settings.ini}" }
    anchor: "**/enabled.txt"
    take: parent.parent
    placeAt: "${ue4ssModsPath}"
    modType: subnautica2-ue4ss

  # --- Priority 24: UE4SS Lua (bare .lua files, no Scripts/ directory) ---
  # Some mods put .lua files directly in the mod folder without a Scripts/ subdirectory.
  - id: ue4ss-lua-bare
    priority: 24
    when: { hasFile: "**/*.lua" }
    unless:
      any:
        - { hasFile: "**/Scripts/*.lua" }
        - { hasFile: "**/enabled.txt" }
        - { hasFile: "**/*.pak" }
        - { hasFile: "**/{dwmapi.dll,xinput1_4.dll,UE4SS-settings.ini}" }
    anchor: "**/*.lua"
    take: parent.parent
    placeAt: "${ue4ssModsPath}"
    modType: subnautica2-ue4ss

  # --- Priority 10: Root (game-relative archives laid out from the install root) ---
  # Wins over the payload-specific installers below: when an archive is already
  # arranged from the game's install root (a top-level Subnautica2/ or Engine/
  # segment), the whole tree is deployed as-is. This is what keeps MIXED mods
  # intact — e.g. an archive carrying both a UE4SS Lua payload (under Binaries/)
  # and an asset-replacement pak (under Content/Paks/) lands every file in the
  # right place instead of a narrow installer claiming it and dropping the rest.
  - id: root
    priority: 10
    when:
      any:
        - { hasFile: "Subnautica2/**" }
        - { hasFile: "Engine/**" }
    anchor: "**/*"
    take: archive-root
    placeAt: "${installPath}"
    modType: subnautica2-root

  # --- Priority 11: Content folder (project-relative trees: Content/, Config/, Binaries/) ---
  # Sibling of `root` for archives laid out from the game PROJECT folder rather
  # than the install root. Whole tree deploys to ${gamePath} (= installPath on
  # Xbox, installPath/Subnautica2 elsewhere), so Binaries/ correctly lands under
  # the project folder. Like `root`, it wins over the narrow installers below.
  - id: content-folder
    priority: 11
    when:
      any:
        - { hasFile: "Content/**" }
        - { hasFile: "Config/**" }
        - { hasFile: "Binaries/**" }
    anchor: "**/*"
    take: archive-root
    placeAt: "${gamePath}"
    modType: subnautica2-contentfolder

  # --- Priority 28: Pak (default fallback for asset-replacement paks) ---
  # The catch-all for plain asset paks (and IO-store .utoc/.ucas, with or without
  # a sibling .pak). Flattens the pak set to its basename under Content/Paks (the
  # broad, reliable mods folder). Everything more specific — game-relative trees
  # (root/content-folder), blueprint paks (logicmods), and UE4SS lua mods — has a
  # lower priority number and wins first, so this needs no `unless` guard.
  - id: pak
    priority: 28
    when: { hasFile: "**/*.{pak,utoc}" }
    anchor: "**/*.{pak,utoc}"
    take: parent
    placeAt: "${paksPath}"
    modType: subnautica2-pak

discovery:
  version: { hook: detectGameVersion }

setup:
  ensureDirs:
    - ${pakModsPath}
    - ${logicModsPath}
    - ${ue4ssModsPath}

events:
  did-deploy: { hook: regenerateModsTxt }

toolbarActions:
  - id: open-ue4ss-settings
    title: Open UE4SS Settings INI
    priority: 200
    target: { openFile: "${ue4ssRootPath}/UE4SS-settings.ini" }

  - id: open-mods-txt
    title: Open UE4SS mods.txt
    priority: 201
    target: { openFile: "${ue4ssModsPath}/mods.txt" }

  - id: open-nexus-page
    title: Open Nexus Page
    priority: 202
    target: { openUrl: "https://www.nexusmods.com/subnautica2" }

nexus:
  modId: 1091
  fileGroupId: 7418978
  displayName: Subnautica 2 Support for Vortex

tests:
  corpus: nexus
  cases:
    # --- UE4SS Injector ---
    - name: "injector: dwmapi.dll at archive root"
      archive:
        - dwmapi.dll
        - UE4SS.dll
      expect:
        matched: ue4ss-injector
        modType: subnautica2-ue4ss-injector
        plan:
          - ${ue4ssInjectorPath}/dwmapi.dll
          - ${ue4ssInjectorPath}/UE4SS.dll

    - name: "injector: marker in subfolder strips wrapper"
      archive:
        - ue4ss/dwmapi.dll
        - ue4ss/UE4SS.dll
        - ue4ss/UE4SS-settings.ini
      expect:
        matched: ue4ss-injector
        modType: subnautica2-ue4ss-injector
        plan:
          - ${ue4ssInjectorPath}/dwmapi.dll
          - ${ue4ssInjectorPath}/UE4SS.dll
          - ${ue4ssInjectorPath}/UE4SS-settings.ini

    - name: "injector: case-insensitive marker"
      archive:
        - Pack/DWMAPI.DLL
      expect:
        matched: ue4ss-injector
        modType: subnautica2-ue4ss-injector

    - name: "injector: xinput1_4.dll (Xbox marker)"
      archive:
        - xinput1_4.dll
        - UE4SS.dll
      expect:
        matched: ue4ss-injector
        modType: subnautica2-ue4ss-injector

    # --- LogicMods ---
    - name: "logicmods: paks under LogicMods/ folder"
      archive:
        - Pack/LogicMods/BPFolder/X.pak
        - Pack/LogicMods/Y.pak
      expect:
        matched: logicmods
        modType: subnautica2-logicmods
        plan:
          - ${paksPath}/LogicMods/BPFolder/X.pak
          - ${paksPath}/LogicMods/Y.pak

    - name: "logicmods: case-insensitive"
      archive:
        - Outer/logicmods/Inner.pak
      expect:
        matched: logicmods
        modType: subnautica2-logicmods

    # --- UE4SS Lua (Scripts) ---
    - name: "ue4ss: lua mod with Scripts folder"
      archive:
        - MyMod/Scripts/main.lua
        - MyMod/Scripts/util.lua
      expect:
        matched: ue4ss-lua
        modType: subnautica2-ue4ss
        plan:
          - ${ue4ssModsPath}/MyMod/Scripts/main.lua
          - ${ue4ssModsPath}/MyMod/Scripts/util.lua

    - name: "ue4ss: wrapped mod strips outer directory"
      archive:
        - wrapper/MyMod/Scripts/main.lua
        - wrapper/MyMod/enabled.txt
      expect:
        matched: ue4ss-lua
        modType: subnautica2-ue4ss
        plan:
          - ${ue4ssModsPath}/MyMod/Scripts/main.lua
          - ${ue4ssModsPath}/MyMod/enabled.txt

    # A game-relative UE4SS lua mod (laid out from the install root) now deploys
    # as an intact tree via `root`. The files land at the SAME physical location
    # the old `ue4ss-lua` collapse produced, and the did-deploy mods.txt hook
    # still picks them up (it scans the ue4ss Mods dir regardless of modType).
    - name: "root: deep game-relative ue4ss mod kept as-is"
      archive:
        - Subnautica2/Binaries/Win64/ue4ss/Mods/CoolMod/Scripts/main.lua
        - Subnautica2/Binaries/Win64/ue4ss/Mods/CoolMod/enabled.txt
      expect:
        matched: root
        modType: subnautica2-root
        plan:
          - ${installPath}/Subnautica2/Binaries/Win64/ue4ss/Mods/CoolMod/Scripts/main.lua
          - ${installPath}/Subnautica2/Binaries/Win64/ue4ss/Mods/CoolMod/enabled.txt

    - name: "ue4ss: lua mod with extra asset files"
      archive:
        - MyMod/Scripts/main.lua
        - MyMod/shared/config.json
        - MyMod/enabled.txt
      expect:
        matched: ue4ss-lua
        modType: subnautica2-ue4ss
        plan:
          - ${ue4ssModsPath}/MyMod/Scripts/main.lua
          - ${ue4ssModsPath}/MyMod/shared/config.json
          - ${ue4ssModsPath}/MyMod/enabled.txt

    # --- UE4SS Lua (enabled.txt only) ---
    - name: "ue4ss-enabled: enabled.txt mod without Scripts"
      archive:
        - MyLuaMod/enabled.txt
        - MyLuaMod/data.json
      expect:
        matched: ue4ss-lua-enabled
        modType: subnautica2-ue4ss
        plan:
          - ${ue4ssModsPath}/MyLuaMod/enabled.txt
          - ${ue4ssModsPath}/MyLuaMod/data.json

    # --- UE4SS Lua (bare .lua) ---
    - name: "ue4ss-bare: lua files without Scripts/ directory"
      archive:
        - FishMod/main.lua
        - FishMod/config.lua
        - FishMod/physics.lua
      expect:
        matched: ue4ss-lua-bare
        modType: subnautica2-ue4ss
        plan:
          - ${ue4ssModsPath}/FishMod/main.lua
          - ${ue4ssModsPath}/FishMod/config.lua
          - ${ue4ssModsPath}/FishMod/physics.lua

    # --- Root ---
    - name: "root: Subnautica2 + Engine segments"
      archive:
        - Subnautica2/Content/Paks/foo.pak
        - Engine/Content/bar.uasset
      expect:
        matched: root
        modType: subnautica2-root
        plan:
          - ${installPath}/Subnautica2/Content/Paks/foo.pak
          - ${installPath}/Engine/Content/bar.uasset

    - name: "content-folder: bare Binaries/ tree lands under the project folder"
      archive:
        - Binaries/Win64/mod.dll
      expect:
        matched: content-folder
        modType: subnautica2-contentfolder
        plan:
          - ${gamePath}/Binaries/Win64/mod.dll

    # --- Content Folder ---
    - name: "content-folder: Content/ at archive root"
      archive:
        - Content/Foo.uasset
        - Content/Bar.uexp
      expect:
        matched: content-folder
        modType: subnautica2-contentfolder
        plan:
          - ${gamePath}/Content/Foo.uasset
          - ${gamePath}/Content/Bar.uexp

    - name: "content-folder: Config/ at archive root"
      archive:
        - Config/settings.ini
      expect:
        matched: content-folder
        modType: subnautica2-contentfolder
        plan:
          - ${gamePath}/Config/settings.ini

    # --- Pak (default fallback, flattened into Content/Paks) ---
    - name: "pak: single pak file"
      archive:
        - SomeMod/Cool.pak
      expect:
        matched: pak
        modType: subnautica2-pak
        plan:
          - ${paksPath}/Cool.pak

    - name: "pak: pak+ucas+utoc triplet flattened"
      archive:
        - SomeMod/files/x_P.pak
        - SomeMod/files/x_P.ucas
        - SomeMod/files/x_P.utoc
      expect:
        matched: pak
        modType: subnautica2-pak
        plan:
          - ${paksPath}/x_P.pak
          - ${paksPath}/x_P.ucas
          - ${paksPath}/x_P.utoc

    - name: "pak: deeply nested pak flattened to basename"
      archive:
        - a/b/c/d/MyMod.pak
      expect:
        matched: pak
        modType: subnautica2-pak
        plan:
          - ${paksPath}/MyMod.pak

    # IO-store-only mods (utoc/ucas, no sibling .pak) are the same shape — the
    # merged `pak` installer handles them via the {pak,utoc} anchor.
    - name: "pak: utoc+ucas without a .pak"
      archive:
        - SomeMod/x_P.utoc
        - SomeMod/x_P.ucas
      expect:
        matched: pak
        modType: subnautica2-pak
        plan:
          - ${paksPath}/x_P.utoc
          - ${paksPath}/x_P.ucas

    # A bare archive that nests its paks under a Paks/ folder (not game-relative)
    # is flattened into Content/Paks. Game-relative trees keep their structure via
    # `root`/`content-folder`; this only affects loose, non-rooted archives.
    - name: "pak: paks inside a bare Paks/ folder are flattened into Content/Paks"
      archive:
        - mod/Paks/sub/x.pak
        - mod/Paks/sub/x.ucas
        - mod/Paks/sub/x.utoc
      expect:
        matched: pak
        modType: subnautica2-pak
        plan:
          - ${paksPath}/x.pak
          - ${paksPath}/x.ucas
          - ${paksPath}/x.utoc

    # --- Priority / losesTo scenarios ---
    - name: "pak loses to logicmods"
      archive:
        - Outer/LogicMods/Inner/X.pak
      expect:
        matched: logicmods
        modType: subnautica2-logicmods

    - name: "pak loses to ue4ss-lua"
      archive:
        - Outer/Cool.pak
        - Outer/Scripts/main.lua
      expect:
        matched: ue4ss-lua
        modType: subnautica2-ue4ss

    # A Content-rooted archive (laid out from the project folder) is a game-relative
    # tree, so `content-folder` keeps it intact — the LogicMods/ subtree included —
    # rather than the narrower `logicmods` installer carving it out.
    - name: "content-folder: Content-rooted LogicMods tree kept intact"
      archive:
        - Content/Paks/LogicMods/X.pak
      expect:
        matched: content-folder
        modType: subnautica2-contentfolder
        plan:
          - ${gamePath}/Content/Paks/LogicMods/X.pak

    # --- Mixed game-relative mod (UE4SS lua + asset-replacement pak) ---
    # Real-world shape (NotOnlyTitanium, modId 185): a single archive laid out from
    # the install root carrying BOTH a UE4SS Lua payload and a pak payload. It must
    # deploy as one intact tree — the pak triplet must NOT be dropped.
    - name: "root: mixed lua+pak game-relative archive keeps paks"
      archive:
        - Subnautica2/Binaries/Win64/ue4ss/Mods/NotOnlyTitanium/Scripts/config.lua
        - Subnautica2/Binaries/Win64/ue4ss/Mods/NotOnlyTitanium/Scripts/main.lua
        - Subnautica2/Binaries/Win64/ue4ss/Mods/NotOnlyTitanium/enabled.txt
        - Subnautica2/Content/Paks/~mods/NotOnlyTitaniumSKIN_P.pak
        - Subnautica2/Content/Paks/~mods/NotOnlyTitaniumSKIN_P.ucas
        - Subnautica2/Content/Paks/~mods/NotOnlyTitaniumSKIN_P.utoc
      expect:
        matched: root
        modType: subnautica2-root
        plan:
          - ${installPath}/Subnautica2/Binaries/Win64/ue4ss/Mods/NotOnlyTitanium/Scripts/config.lua
          - ${installPath}/Subnautica2/Binaries/Win64/ue4ss/Mods/NotOnlyTitanium/Scripts/main.lua
          - ${installPath}/Subnautica2/Binaries/Win64/ue4ss/Mods/NotOnlyTitanium/enabled.txt
          - ${installPath}/Subnautica2/Content/Paks/~mods/NotOnlyTitaniumSKIN_P.pak
          - ${installPath}/Subnautica2/Content/Paks/~mods/NotOnlyTitaniumSKIN_P.ucas
          - ${installPath}/Subnautica2/Content/Paks/~mods/NotOnlyTitaniumSKIN_P.utoc

validators:
  - id: logicmods-validator
    name: Archives with LogicMods should match logicmods installer
    when: { hasFile: "**/LogicMods/**/*.pak" }
    assert:
      matched: logicmods

  - id: ue4ss-lua-validator
    name: Bare archives with Scripts/*.lua should match ue4ss-lua
    when:
      all:
        - { hasFile: "**/Scripts/*.lua" }
        - not: { hasFile: "**/{dwmapi.dll,xinput1_4.dll,UE4SS-settings.ini}" }
        # Game-relative archives (laid out from the install/project root) are
        # claimed by `root`/`content-folder` and deploy as an intact tree.
        - not: { hasFile: "Subnautica2/**" }
        - not: { hasFile: "Engine/**" }
        - not: { hasFile: "Content/**" }
        - not: { hasFile: "Binaries/**" }
    assert:
      matched: ue4ss-lua

  - id: injector-validator
    name: Archives with injector markers should match ue4ss-injector
    when: { hasFile: "**/{dwmapi.dll,xinput1_4.dll,UE4SS-settings.ini}" }
    assert:
      matched: ue4ss-injector
